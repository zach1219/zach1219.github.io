{% include base_path %}

<footer>
  <div class="footer-links">
    {% if site.author.github %}
      <a href="https://github.com/{{ site.author.github }}"><i class="fab fa-github"></i> GitHub</a>
    {% endif %}
    <a href="{{ base_path }}/sitemap/">站点地图</a>
    <a href="{{ base_path }}/feed.xml">RSS</a>
  </div>
  <div class="footer-copyright">
    &copy; {{ site.time | date: '%Y' }} {{ site.name | default: site.title }}<br>
    由 <a href="https://zach1219.github.io/">zach</a> 创建 · 站点更新于 {{ "now" | date: '%Y-%m-%d' }}
  </div>
</footer>
